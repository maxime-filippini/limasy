version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=1234
      - DATABASE_PATH=/app/data/database.db
    volumes:
      - /var/lib/limasy:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BASE_PATH: /limasy
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - BACKEND_URL=http://server:1234
      - ORIGIN=http://vps.follow-scylla.ts.net
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
    labels:
      - caddy_1=http://vps.follow-scylla.ts.net
      - caddy_1.handle=/_app*
      - 'caddy_1.handle.0_reverse_proxy={{upstreams 3000}}'
